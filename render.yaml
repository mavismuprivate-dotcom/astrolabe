services:
  - type: web
    name: astrolabe
    runtime: go
    plan: free
    buildCommand: go build -o bin/astrolabe ./cmd/server
    startCommand: ./bin/astrolabe
    autoDeploy: true
    envVars:
      - key: GO_VERSION
        value: 1.24.5
      - key: PORT
        value: 10000
      - key: ASTROLABE_DB_PATH
        value: /tmp/astrolabe.db
